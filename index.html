<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* Το CSS παραμένει ακριβώς το ίδιο για να μη μεταβληθεί η εμφάνιση */
:root{
  --bg:#0a0c12;--surface:#13151e;--surface2:#1a1d28;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6e80;
  --accent:#5b7fff;--green:#2ecc8f;--red:#ff5f6d;--amber:#f59e0b;--purple:#a78bfa;
  --green-bg:rgba(46,204,143,0.12);--red-bg:rgba(255,95,109,0.12);
  --amber-bg:rgba(245,158,11,0.12);--purple-bg:rgba(167,139,250,0.12);
  --radius:14px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden;}
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.s-overlay.open{opacity:1;pointer-events:all;}
.s-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:101;transform:translateX(100%);transition:transform 0.28s ease;overflow-y:auto;padding-bottom:40px;}
.s-panel.open{transform:translateX(0);}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.s-head-title{font-size:14px;font-weight:600;}
.s-close{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.s-tabs{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--border);position:sticky;top:57px;background:var(--bg);z-index:1;}
.s-tab{font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px 6px 0 0;border:none;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(91,127,255,0.05);}
.s-tabcontent{display:none;padding:16px 18px;flex-direction:column;gap:16px;}
.s-tabcontent.active{display:flex;}
.s-sec{display:flex;flex-direction:column;gap:8px;}
.s-stitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.s-label{font-size:11px;font-weight:500;color:var(--text);}
.s-hint{font-size:10px;color:var(--muted);line-height:1.4;}
.s-hint a{color:var(--accent);}
.s-input{font-size:12px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.s-input:focus{outline:none;border-color:var(--accent);}
.s-ta{font-size:11px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;resize:vertical;min-height:72px;line-height:1.6;}
.s-ta:focus{outline:none;border-color:var(--accent);}
.api-wrap{position:relative;}
.api-wrap input{padding-right:80px;}
.api-tog{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.api-st{font-size:10px;margin-top:3px;}
.api-st.ok{color:var(--green);}
.api-st.warn{color:var(--muted);}
.thr-in{width:80px;font-size:13px;font-family:'DM Mono',monospace;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);text-align:right;}
.s-log{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);line-height:1.9;max-height:240px;overflow-y:auto;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;display:none;}
.s-log.show{display:block;}
.gw-list{display:flex;flex-direction:column;gap:6px;}
.gw-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.gw-logo{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface);}
.gw-name{font-size:12px;font-weight:600;flex:1;}
.gw-sym{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.gw-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;}
.gw-add-row{display:flex;gap:6px;margin-top:4px;}
.gw-search{flex:1;}
.gw-add-btn{padding:8px 14px;border-radius:var(--radius-sm);background:rgba(212,175,55,0.15);color:#d4af37;border:1px solid rgba(212,175,55,0.3);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;}
.gw-suggestions{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:160px;overflow-y:auto;}
.gw-sug-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
.s-range{width:100%;accent-color:var(--accent);}
.s-color-row{display:flex;gap:8px;flex-wrap:wrap;}
.s-color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.s-color-opt.active{border-color:#fff;transform:scale(1.15);}
.s-select{font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.s-preview{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;margin-top:4px;}
.banner{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#060d1f 0%,#0f1a35 40%,#1a0a30 100%);border-bottom:1px solid rgba(91,127,255,0.15);overflow:hidden;}
.banner-orb{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;}
.banner-orb1{width:120px;height:120px;background:rgba(91,127,255,0.25);top:-40px;left:60px;}
.banner-orb2{width:80px;height:80px;background:rgba(167,139,250,0.2);top:-20px;right:120px;}
.banner-orb3{width:60px;height:60px;background:rgba(34,211,238,0.12);bottom:-20px;left:200px;}
.banner-inner{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;position:relative;z-index:1;}
.banner-l{display:flex;align-items:center;gap:10px;min-width:0;}
.banner-logo{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(91,127,255,0.3),rgba(167,139,250,0.3));border:1px solid rgba(91,127,255,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.banner-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(90deg,#ffffff 0%,#a5b4fc 60%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.banner-sub{font-size:10px;color:rgba(160,168,200,0.7);margin-top:2px;font-family:'DM Mono',monospace;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#2ecc8f;box-shadow:0 0 6px #2ecc8f;animation:pulse 2s infinite;}
.live-lbl{font-size:10px;font-family:'DM Mono',monospace;color:#2ecc8f;}
.banner-btn{height:34px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;transition:all 0.15s;}
.btn-save-banner{background:linear-gradient(135deg,rgba(91,127,255,0.8),rgba(126,105,255,0.8));color:#fff;min-width:120px;justify-content:center;}
.btn-save-banner.saved{background:linear-gradient(135deg,rgba(46,204,143,0.8),rgba(16,185,129,0.8));}
.save-tick{display:none;}
.btn-save-banner.saved .save-tick{display:inline;}
.btn-save-banner.saved .save-label{display:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.dash{max-width:700px;margin:0 auto;padding:12px 12px 60px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}
.sc-lbl{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;}
.sc-val.pos{color:var(--green);}
.sc-val.neg{color:var(--red);}
.wr,.wr-gold{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.wc,.wc-gold{background:var(--surface);border-radius:var(--radius);padding:12px 13px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);}
.wc.btc{border-color:rgba(245,158,11,0.25);}
.wc.eth{border-color:rgba(91,127,255,0.25);}
.wc-gold{border-color:rgba(212,175,55,0.2);}
.wl{display:flex;align-items:center;gap:10px;}
.wc-logo,.gw-logo-sm{width:34px;height:34px;border-radius:50%;object-fit:cover;}
.wn,.wn-gold{font-size:12px;font-weight:600;}
.wsym{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
.wp{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;}
.chg,.chg-sm{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:99px;}
.chg.pos,.chg-sm.pos{background:var(--green-bg);color:var(--green);}
.chg.neg,.chg-sm.neg{background:var(--red-bg);color:var(--red);}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:12px;}
.ctr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;}
.ct{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.rb-row{display:flex;gap:5px;margin-bottom:9px;}
.rb{font-size:10px;padding:3px 10px;border-radius:99px;cursor:pointer;border:none;background:var(--surface2);color:var(--muted);font-family:'DM Mono',monospace;}
.rb.active{background:rgba(91,127,255,0.2);color:var(--accent);}
.cw{position:relative;height:185px;}
.coin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;}
.chl{display:flex;align-items:center;gap:9px;}
.cdot{width:9px;height:9px;border-radius:50%;}
.cname{font-size:14px;font-weight:600;}
.cprice{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;}
.cb{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px;}
.cf{display:flex;flex-direction:column;gap:3px;}
.cfl{font-size:9px;color:var(--muted);text-transform:uppercase;}
.cfv{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.cin{width:100%;font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);text-align:right;}
.stk-box{margin:0 14px 12px;padding:10px 12px;background:rgba(167,139,250,0.05);border:1px solid rgba(167,139,250,0.18);border-radius:10px;}
.badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:99px;font-weight:500;font-family:'DM Mono',monospace;margin-right:4px;}
.badge.wa{background:var(--amber-bg);color:var(--amber);}
.badge.st{background:var(--purple-bg);color:var(--purple);}
.sg-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:11px;margin-bottom:8px;}
.sg.hidden{display:none;}
.rewards-card{background:var(--surface);border:1px solid rgba(167,139,250,0.2);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;}
.rewards-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(167,139,250,0.05);}
.rewards-grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);}
.rewards-cell{padding:11px 12px;border-right:1px solid var(--border);}
.rewards-period{font-size:9px;color:var(--muted);text-transform:uppercase;}
.rewards-eur{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--green);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;padding:10px 20px;border-radius:99px;opacity:0;transition:all 0.25s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px);}
.toast.green{background:var(--green);}
.ph-card{background:linear-gradient(135deg,#0f1729 0%,#13151e 70%);border:1px solid rgba(91,127,255,0.2);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.alerts-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.alert-item{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<div class="s-overlay" id="s-overlay"></div>
<div class="s-panel" id="s-panel">
  <div class="s-head">
    <span class="s-head-title">⚙ Ρυθμίσεις</span>
    <button class="s-close" id="s-close-btn">✕</button>
  </div>

  <div class="s-tabs">
    <button class="s-tab active" data-tab="wallet">💼 Wallet</button>
    <button class="s-tab" data-tab="watch">⭐ Watch</button>
    <button class="s-tab" data-tab="appear">🎨 Θέμα</button>
    <button class="s-tab" data-tab="layout">📐 Layout</button>
    <button class="s-tab" data-tab="api">🔑 API</button>
  </div>

  <div class="s-tabcontent active" id="tab-wallet">
    <div class="s-sec">
      <div class="s-stitle">🔗 Wallet Διευθύνσεις</div>
      <div class="s-label">Cosmos (ATOM, OSMO κ.ά.)</div>
      <textarea class="s-ta" id="cosmos-addrs" placeholder="cosmos1abc..."></textarea>
      <div class="s-label">Cardano (ADA)</div>
      <textarea class="s-ta" id="cardano-addrs" placeholder="addr1abc..."></textarea>
    </div>
    <div class="s-sec">
      <div class="s-stitle">⚖️ Ελάχιστη αξία εμφάνισης</div>
      <input class="thr-in" id="threshold" type="number" value="100"/>
    </div>
    <button class="btn btn-sync-s" id="sync-btn" style="padding:10px; border-radius:8px; cursor:pointer; background:var(--amber); font-weight:bold;">⟳ Συγχρονισμός</button>
    <div class="s-log" id="sync-log"></div>
  </div>

  <div class="s-tabcontent" id="tab-watch">
    <div class="gw-list" id="gw-list"></div>
    <div class="gw-add-row">
      <input class="s-input gw-search" id="gw-search" placeholder="Αναζήτηση..."/>
    </div>
    <div class="gw-suggestions" id="gw-suggestions"></div>
  </div>

  <div class="s-tabcontent" id="tab-appear">
    <div class="s-stitle">🎨 Accent Color</div>
    <div class="s-color-row" id="accent-colors">
        <div class="s-color-opt active" data-color="#5b7fff" style="background:#5b7fff"></div>
        <div class="s-color-opt" data-color="#2ecc8f" style="background:#2ecc8f"></div>
        <div class="s-color-opt" data-color="#a78bfa" style="background:#a78bfa"></div>
        <div class="s-color-opt" data-color="#f59e0b" style="background:#f59e0b"></div>
    </div>
  </div>

  <div class="s-tabcontent" id="tab-api">
    <div class="s-stitle">🔑 CoinGecko API Key</div>
    <input class="s-input" type="password" id="cg-key" placeholder="CG-xxx"/>
    <button class="btn btn-sync-s" id="manual-save-btn" style="margin-top:10px; background:var(--accent); color:white; padding:8px; border-radius:5px;">💾 Αποθήκευση</button>
  </div>
</div>

<div class="banner">
  <div class="banner-orb banner-orb1"></div>
  <div class="banner-orb banner-orb2"></div>
  <div class="banner-inner">
    <div class="banner-l">
      <div class="banner-logo">
        <svg viewBox="0 0 40 40" width="26" fill="white"><circle cx="20" cy="20" r="4"/><ellipse cx="20" cy="20" rx="16" ry="6" stroke="white" stroke-width="1.5" fill="none"/></svg>
      </div>
      <div class="banner-text">
        <div class="banner-title">Cosmos Portfolio</div>
        <div class="banner-sub" id="last-update">Φόρτωση...</div>
      </div>
    </div>
    <div class="banner-center"><span class="live-dot"></span><span class="live-lbl">Live</span></div>
    <div class="banner-r">
      <button class="banner-btn" id="refresh-btn">⟳</button>
      <button class="banner-btn btn-save-banner" id="save-btn"><span class="save-label">Save</span><span class="save-tick">✓</span></button>
      <button class="banner-btn" id="gear-btn">⚙</button>
    </div>
  </div>
</div>

<div class="dash">
  <div class="sg-wrap">
    <button class="sg-toggle" id="sg-toggle"><span>Σύνοψη</span> <span id="sg-icon">▲</span></button>
    <div class="sg" id="sg-cards">
      <div class="sc"><div class="sc-lbl">Αξία</div><div class="sc-val" id="total-val">—</div></div>
      <div class="sc"><div class="sc-lbl">P&L</div><div class="sc-val" id="total-pnl">—</div></div>
    </div>
  </div>

  <div class="ph-card">
    <div class="ct">Αξία Portfolio</div>
    <div id="ph-current-val" style="font-size:24px; font-weight:bold;">—</div>
    <div style="height:200px;"><canvas id="chart-phistory"></canvas></div>
  </div>

  <div class="wr">
    <div class="wc btc">
      <div class="wl"><img class="wc-logo" src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" alt="BTC"><div>BTC</div></div>
      <div class="wp" id="btc-price">—</div>
    </div>
    <div class="wc eth">
      <div class="wl"><img class="wc-logo" src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" alt="ETH"><div>ETH</div></div>
      <div class="wp" id="eth-price">—</div>
    </div>
  </div>

  <div class="wr-gold" id="gold-watch-row"></div>

  <div class="cc">
    <div class="ct">Portfolio vs BTC</div>
    <div class="cw"><canvas id="chart-compare"></canvas></div>
  </div>

  <div class="rewards-section" id="rewards-section" style="display:none;">
    <div class="ct">Staking Rewards</div>
    <div id="rewards-cards"></div>
  </div>

  <div class="sec-title" style="margin:20px 0 10px; font-weight:bold; color:var(--muted);">PORTFOLIO</div>
  <div class="coins-wrap" id="coins-wrap"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* CORE LOGIC - FIXED & CLEANED */
const BTC_ID='bitcoin', ETH_ID='ethereum';
const PAL=['#2ecc8f','#ff7f50','#a78bfa','#22d3ee','#ec4899','#84cc16','#ff5f6d','#5b7fff'];
const CHAIN_APR={'cosmos':14.5,'osmosis':12.0,'juno-network':35.0,'dymension':40.0,'saga-2':25.0,'celestia':12.0};

const COSMOS_CHAINS=[
  {id:'cosmos', name:'Cosmos', sym:'ATOM', prefix:'cosmos', denom:'uatom', dec:6, ep:['https://cosmos-rest.publicnode.com']},
  {id:'osmosis', name:'Osmosis', sym:'OSMO', prefix:'osmo', denom:'uosmo', dec:6, ep:['https://osmosis-rest.publicnode.com']},
  {id:'dymension', name:'Dymension', sym:'DYM', prefix:'dym', denom:'adym', dec:18, ep:['https://dymension-rest.publicnode.com']},
  {id:'celestia', name:'Celestia', sym:'TIA', prefix:'celestia', denom:'utia', dec:6, ep:['https://celestia-rest.publicnode.com']}
];

let activeCoinIds = [];
let ud = {};
let prices = {};
let changes = {};
let displayCurrency = 'eur';
let currencyRate = 1;
let currencySymbol = '€';

// Initialize data structures
function initUD(id) { if(!ud[id]) ud[id]={qty:0, avg:0, liquid:0, staked:0, synced:false, validators:[]}; }

// LocalStorage helpers
function loadSaved(){
  const saved = JSON.parse(localStorage.getItem('cp_v10') || '{}');
  if(saved.coins) Object.assign(ud, saved.coins);
  if(saved.ids) activeCoinIds = saved.ids;
  document.getElementById('cosmos-addrs').value = saved.cosmosAddrs || '';
  document.getElementById('cardano-addrs').value = saved.cardanoAddrs || '';
}

function saveData(){
  activeCoinIds.forEach(id => {
    const q = document.getElementById(`qty-${id}`);
    const a = document.getElementById(`avg-${id}`);
    if(q) ud[id].qty = parseFloat(q.value) || 0;
    if(a) ud[id].avg = parseFloat(a.value) || 0;
  });
  const data = {ids: activeCoinIds, coins: ud, cosmosAddrs: document.getElementById('cosmos-addrs').value, cardanoAddrs: document.getElementById('cardano-addrs').value};
  localStorage.setItem('cp_v10', JSON.stringify(data));
  showToast('Αποθηκεύτηκε', 'green');
}

// Formatting
const fmt = (n, d) => new Intl.NumberFormat('el-GR', {minimumFractionDigits: d, maximumFractionDigits: d}).format(n);
const fmtCur = (n) => `${fmt(n * currencyRate, n * currencyRate >= 1 ? 2 : 4)}${currencySymbol}`;

// API Logic
async function loadPrices() {
  const ids = [...new Set([...activeCoinIds, BTC_ID, ETH_ID])].join(',');
  try {
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=eur&include_24hr_change=true`);
    const data = await r.json();
    Object.keys(data).forEach(id => {
      prices[id] = data[id].eur;
      changes[id] = data[id].eur_24h_change;
    });
    updateUI();
  } catch(e) { console.error("Price fetch failed"); }
}

function updateUI() {
  document.getElementById('btc-price').textContent = fmtCur(prices[BTC_ID] || 0);
  document.getElementById('eth-price').textContent = fmtCur(prices[ETH_ID] || 0);
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('el-GR');
  buildCards();
  recalcTotal();
}

function buildCards() {
  const wrap = document.getElementById('coins-wrap');
  wrap.innerHTML = '';
  activeCoinIds.forEach((id, i) => {
    initUD(id);
    const p = prices[id] || 0;
    const q = ud[id].qty;
    const val = p * q;
    
    const card = document.createElement('div');
    card.className = 'coin-card';
    card.innerHTML = `
      <div class="ch">
        <div class="chl"><span class="cdot" style="background:${PAL[i%PAL.length]}"></span><span class="cname">${id.toUpperCase()}</span></div>
        <div class="cprice">${fmtCur(p)}</div>
      </div>
      <div class="cb">
        <div class="cf"><div class="cfl">ΠΟΣΟΤΗΤΑ</div><input class="cin" id="qty-${id}" value="${q}"></div>
        <div class="cf"><div class="cfl">ΑΞΙΑ</div><div class="cfv">${fmtCur(val)}</div></div>
      </div>
    `;
    wrap.appendChild(card);
    
    // Auto-save typing
    card.querySelector('input').addEventListener('input', () => {
        ud[id].qty = parseFloat(card.querySelector('input').value) || 0;
        recalcTotal();
    });
  });
}

function recalcTotal() {
  let total = 0;
  activeCoinIds.forEach(id => total += (prices[id] || 0) * (ud[id].qty || 0));
  document.getElementById('total-val').textContent = fmtCur(total);
  document.getElementById('ph-current-val').textContent = fmtCur(total);
}

// UI Triggers
document.getElementById('gear-btn').addEventListener('click', () => {
    document.getElementById('s-panel').classList.add('open');
    document.getElementById('s-overlay').classList.add('open');
});
document.getElementById('s-close-btn').addEventListener('click', () => {
    document.getElementById('s-panel').classList.remove('open');
    document.getElementById('s-overlay').classList.remove('open');
});
document.getElementById('save-btn').addEventListener('click', saveData);
document.getElementById('refresh-btn').addEventListener('click', loadPrices);

function showToast(m, c) {
    const t = document.getElementById('toast');
    t.textContent = m; t.className = `toast show ${c}`;
    setTimeout(() => t.classList.remove('show'), 2000);
}

// Start
loadSaved();
loadPrices();
setInterval(loadPrices, 60000);

// Tab switching
document.querySelectorAll('.s-tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.s-tab, .s-tabcontent').forEach(el => el.classList.remove('active'));
        t.classList.add('active');
        document.getElementById(`tab-${t.dataset.tab}`).classList.add('active');
    });
});
</script>
</body>
</html>
