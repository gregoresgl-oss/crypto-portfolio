<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c12;--surface:#13151e;--surface2:#1a1d28;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6e80;
  --accent:#5b7fff;--green:#2ecc8f;--red:#ff5f6d;--amber:#f59e0b;--purple:#a78bfa;
  --green-bg:rgba(46,204,143,0.12);--red-bg:rgba(255,95,109,0.12);
  --amber-bg:rgba(245,158,11,0.12);--purple-bg:rgba(167,139,250,0.12);
  --radius:14px;--radius-sm:8px;
}
.light-mode {
  --bg:#f4f5f7; --surface:#ffffff; --surface2:#e9ecef;
  --border:rgba(0,0,0,0.1); --text:#111827; --muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden;}

/* Settings */
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.s-overlay.open{opacity:1;pointer-events:all;}
.s-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:101;transform:translateX(100%);transition:transform 0.28s ease;overflow-y:auto;padding-bottom:40px;}
.s-panel.open{transform:translateX(0);}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.s-head-title{font-size:14px;font-weight:600;}
.s-close{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
/* Settings tabs */
.s-tabs{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--border);position:sticky;top:57px;background:var(--bg);z-index:1;}
.s-tab{font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px 6px 0 0;border:none;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(91,127,255,0.05);}
.s-tabcontent{display:none;padding:16px 18px;flex-direction:column;gap:16px;}
.s-tabcontent.active{display:flex;}
/* Common elements */
.s-sec{display:flex;flex-direction:column;gap:8px;}
.s-stitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.s-label{font-size:11px;font-weight:500;color:var(--text);}
.s-hint{font-size:10px;color:var(--muted);line-height:1.4;}
.s-hint a{color:var(--accent);}
.s-input{font-size:12px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.s-input:focus{outline:none;border-color:var(--accent);}
.s-ta{font-size:11px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;resize:vertical;min-height:72px;line-height:1.6;}
.s-ta:focus{outline:none;border-color:var(--accent);}
.s-ta::placeholder,.s-input::placeholder{color:var(--muted);}
.s-div{border:none;border-top:1px solid var(--border);}
.api-wrap{position:relative;}
.api-wrap input{padding-right:80px;}
.api-tog{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.api-st{font-size:10px;margin-top:3px;}
.api-st.ok{color:var(--green);}
.api-st.warn{color:var(--muted);}
.thr-in{width:80px;font-size:13px;font-family:'DM Mono',monospace;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);text-align:right;}
.thr-in:focus{outline:none;border-color:var(--accent);}
.s-log{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);line-height:1.9;max-height:240px;overflow-y:auto;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;display:none;}
.s-log.show{display:block;}
/* Gold watch manager */
.gw-list{display:flex;flex-direction:column;gap:6px;}
.gw-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.gw-logo{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface);}
.gw-name{font-size:12px;font-weight:600;flex:1;}
.gw-sym{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.gw-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;}
.gw-del:hover{color:var(--red);}
.gw-add-row{display:flex;gap:6px;margin-top:4px;}
.gw-search{flex:1;}
.gw-add-btn{padding:8px 14px;border-radius:var(--radius-sm);background:rgba(212,175,55,0.15);color:#d4af37;border:1px solid rgba(212,175,55,0.3);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;}
.gw-suggestions{display:flex;flex-direction:column;gap:4px;margin-top:6px;max-height:160px;overflow-y:auto;}
.gw-sug-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
.gw-sug-item:hover{border-color:rgba(212,175,55,0.3);background:rgba(212,175,55,0.05);}
.gw-sug-logo{width:22px;height:22px;border-radius:50%;object-fit:cover;background:var(--surface);}
/* Appearance settings */
.s-range{width:100%;accent-color:var(--accent);}
.s-color-row{display:flex;gap:8px;flex-wrap:wrap;}
.s-color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.s-color-opt.active{border-color:#fff;transform:scale(1.15);}
.s-select{font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.s-select:focus{outline:none;border-color:var(--accent);}
.s-preview{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;margin-top:4px;}
.s-log .ok{color:var(--green);}
.s-log .warn{color:var(--amber);}
.s-log .err{color:var(--red);}
.s-log .acc{color:var(--accent);}

/* Banner */
.banner{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#060d1f 0%,#0f1a35 40%,#1a0a30 100%);border-bottom:1px solid rgba(91,127,255,0.15);overflow:hidden;}
.light-mode .banner{background:linear-gradient(135deg,#5b7fff 0%,#a78bfa 100%);}
.banner-orb{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none;}
.banner-orb1{width:120px;height:120px;background:rgba(91,127,255,0.25);top:-40px;left:60px;}
.banner-orb2{width:80px;height:80px;background:rgba(167,139,250,0.2);top:-20px;right:120px;}
.banner-orb3{width:60px;height:60px;background:rgba(34,211,238,0.12);bottom:-20px;left:200px;}
.banner-inner{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;position:relative;z-index:1;}
.banner-l{display:flex;align-items:center;gap:10px;min-width:0;}
.banner-logo{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(91,127,255,0.3),rgba(167,139,250,0.3));border:1px solid rgba(91,127,255,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px rgba(91,127,255,0.3),inset 0 0 10px rgba(255,255,255,0.05);}
.banner-logo svg{width:26px;height:26px;}
.banner-text{min-width:0;}
.banner-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(90deg,#ffffff 0%,#a5b4fc 60%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.banner-sub{font-size:10px;color:rgba(160,168,200,0.7);margin-top:2px;font-family:'DM Mono',monospace;}
.banner-center{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#2ecc8f;box-shadow:0 0 6px #2ecc8f;animation:pulse 2s infinite;}
.live-lbl{font-size:10px;font-family:'DM Mono',monospace;color:#2ecc8f;}
.banner-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.banner-btn{height:34px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.75);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;white-space:nowrap;}
.banner-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);}
.banner-btn:active{opacity:0.75;transform:scale(0.97);}
.btn-save-banner{background:linear-gradient(135deg,rgba(91,127,255,0.8),rgba(126,105,255,0.8));border-color:rgba(91,127,255,0.5);color:#fff;min-width:120px;justify-content:center;}
.btn-save-banner.saved{background:linear-gradient(135deg,rgba(46,204,143,0.8),rgba(16,185,129,0.8));border-color:rgba(46,204,143,0.5);}
.save-tick{display:none;}
.btn-save-banner.saved .save-tick{display:inline;}
.btn-save-banner.saved .save-label{display:none;}
.banner-gear{width:34px;padding:0;justify-content:center;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.live-lbl{font-size:10px;font-family:'DM Mono',monospace;color:var(--green);}

/* Main */
.dash{max-width:700px;margin:0 auto;padding:12px 12px 60px;}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;}
.btn-ghost{background:var(--surface2);color:var(--muted);}
.btn-save{background:var(--accent);color:#fff;min-width:110px;}
.btn-save.saved{background:var(--green);}
.save-tick{display:none;}
.btn-save.saved .save-tick{display:inline;}
.btn-save.saved .save-label{display:none;}
.btn-gear{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-sync-s{background:var(--amber);color:#0a0c12;font-weight:600;width:100%;}

/* Summary */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}
.sc-lbl{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;}
.sc-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.5px;}
.sc-val.pos{color:var(--green);}
.sc-val.neg{color:var(--red);}

/* Watch tickers — unified style */
.wr{display:grid;grid-template-columns:1fr
