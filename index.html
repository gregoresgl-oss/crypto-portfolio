<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Portfolio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c12;--surface:#13151e;--surface2:#1a1d28;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6e80;
  --accent:#5b7fff;--green:#2ecc8f;--red:#ff5f6d;--amber:#f59e0b;--purple:#a78bfa;
  --radius:14px;--radius-sm:8px;
}
.light-mode {
  --bg:#f4f5f7; --surface:#ffffff; --surface2:#e9ecef;
  --border:rgba(0,0,0,0.1); --text:#111827; --muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden; transition: background 0.3s, color 0.3s;}

/* Settings */
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.s-overlay.open{opacity:1;pointer-events:all;}
.s-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:101;transform:translateX(100%);transition:transform 0.28s ease;overflow-y:auto;padding-bottom:40px;}
.s-panel.open{transform:translateX(0);}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.s-head-title{font-size:14px;font-weight:600;}
.s-close{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.s-tabs{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--border);position:sticky;top:57px;background:var(--bg);z-index:1;}
.s-tab{font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px 6px 0 0;border:none;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(91,127,255,0.05);}
.s-tabcontent{display:none;padding:16px 18px;flex-direction:column;gap:16px;}
.s-tabcontent.active{display:flex;}
.s-sec{display:flex;flex-direction:column;gap:8px;}
.s-stitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.s-ta{font-size:11px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;resize:vertical;min-height:72px;}
.s-input{font-size:12px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.btn-sync-s{background:var(--amber);color:#0a0c12;font-weight:600;width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;}
.btn-action{background:var(--surface2);color:var(--text);font-weight:500;width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;}

/* Banner */
.banner{position:sticky;top:0;z-index:90;background:linear-gradient(135deg,#060d1f 0%,#0f1a35 40%,#1a0a30 100%);border-bottom:1px solid rgba(91,127,255,0.15);overflow:hidden;}
.light-mode .banner{background:linear-gradient(135deg,#5b7fff 0%,#a78bfa 100%);}
.banner-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:relative;z-index:1;}
.banner-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.banner-sub{font-size:10px
