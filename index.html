<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Portfolio Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c12;--surface:#13151e;--surface2:#1a1d28;
  --border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#6b6e80;
  --accent:#5b7fff;--green:#2ecc8f;--red:#ff5f6d;--amber:#f59e0b;--purple:#a78bfa;
  --radius:14px;--radius-sm:8px;
}
.light-mode {
  --bg:#f4f5f7; --surface:#ffffff; --surface2:#e9ecef;
  --border:rgba(0,0,0,0.1); --text:#111827; --muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden; transition: background 0.3s, color 0.3s;}

/* Settings */
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.s-overlay.open{opacity:1;pointer-events:all;}
.s-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:var(--bg);border-left:1px solid var(--border);z-index:101;transform:translateX(100%);transition:transform 0.28s ease;overflow-y:auto;padding-bottom:40px;}
.s-panel.open{transform:translateX(0);}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1;}
.s-head-title{font-size:14px;font-weight:600;}
.s-close{width:30px;height:30px;border-radius:var(--radius-sm);background:var(--surface2);border:none;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.s-tabs{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--border);position:sticky;top:57px;background:var(--bg);z-index:1;}
.s-tab{font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px 6px 0 0;border:none;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.15s;}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(91,127,255,0.05);}
.s-tabcontent{display:none;padding:16px 18px;flex-direction:column;gap:16px;}
.s-tabcontent.active{display:flex;}
.s-sec{display:flex;flex-direction:column;gap:8px;}
.s-stitle{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.s-ta{font-size:11px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;resize:vertical;min-height:72px;}
.s-input{font-size:12px;font-family:'DM Mono',monospace;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);width:100%;}
.btn-sync-s{background:var(--amber);color:#0a0c12;font-weight:600;width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;}
.btn-action{background:var(--surface2);color:var(--text);font-weight:500;width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;}

/* Banner */
.banner{position:sticky;top:0;z-index:90;background:linear-gradient(135deg,#060d1f 0%,#0f1a35 40%,#1a0a30 100%);border-bottom:1px solid rgba(91,127,255,0.15);overflow:hidden;}
.light-mode .banner{background:linear-gradient(135deg,#5b7fff 0%,#a78bfa 100%);}
.banner-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:relative;z-index:1;}
.banner-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.banner-sub{font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px;font-family:'DM Mono',monospace;}
.banner-btn{height:34px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;font-weight:500;}

/* Main */
.dash{max-width:700px;margin:0 auto;padding:12px 12px 60px;}
.sec-toggle-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:11px;font-weight:600;margin-bottom:10px;text-transform:uppercase;}
.collapsible-content{transition:all 0.25s;overflow:hidden;}
.collapsible-content.hidden{display:none;}

/* Skeletons */
.skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; color: transparent !important; border-radius: 4px; pointer-events: none; }
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Cards & Widgets */
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;}
.sc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}

/* Allocation Bar */
.alloc-wrap{margin-bottom:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px;}
.alloc-bar{height:8px; border-radius:4px; display:flex; overflow:hidden; width:100%; background:var(--surface2); margin-top:8px;}
.alloc-segment{height:100%; transition:width 0.3s ease;}
.alloc-labels{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; font-size:9px; color:var(--muted);}
.alloc-dot{display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:3px;}

/* Fear & Greed */
.fng-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.fng-val{font-size:22px; font-weight:700; font-family:'DM Mono',monospace;}
.fng-class{font-size:11px; font-weight:600; text-transform:uppercase; padding:3px 8px; border-radius:99px; background:var(--surface2);}

/* Coins List & Empty State */
.coins-wrap{display:flex;flex-direction:column;gap:10px;}
.coin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;}
.cname{font-size:14px;font-weight:600;}
.cprice{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;}
.cb{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px;}
.cin{width:100%;font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);text-align:right;}
.empty-state{text-align:center; padding:40px 20px; background:var(--surface); border:1px dashed var(--border); border-radius:var(--radius); color:var(--muted);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;opacity:0;transition:all 0.25s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.green{background:var(--green);}
</style>
</head>
<body>

<div class="s-overlay" id="s-overlay"></div>
<div class="s-panel" id="s-panel">
  <div class="s-head">
    <span class="s-head-title">⚙ Ρυθμίσεις</span>
    <button class="s-close" id="s-close-btn">✕</button>
  </div>
  <div class="s-tabs">
    <button class="s-tab active" data-tab="wallet">💼 Δεδομένα</button>
    <button class="s-tab" data-tab="theme">🎨 Θέμα</button>
  </div>
  <div class="s-tabcontent active" id="tab-wallet">
    <div class="s-sec">
      <div class="s-stitle">Δοκιμή & Εκκίνηση</div>
      <button class="btn-sync-s" id="sync-btn" onclick="addDemoCoins()">⟳ Προσθήκη Demo Δεδομένων</button>
    </div>
    <hr style="border-color:var(--border); margin:10px 0;">
    <div class="s-sec">
      <div class="s-stitle">💾 Δεδομένα (Export/Import)</div>
      <button class="btn-action" onclick="exportData()">📤 Εξαγωγή Δεδομένων (Copy)</button>
      <button class="btn-action" onclick="importData()">📥 Εισαγωγή Δεδομένων (Paste)</button>
      <button class="btn-action" onclick="clearData()" style="color:var(--red); border-color:rgba(255,95,109,0.3); background:rgba(255,95,109,0.1);">🗑 Καθαρισμός Δεδομένων</button>
    </div>
  </div>
  <div class="s-tabcontent" id="tab-theme">
    <div class="s-sec">
      <div class="s-stitle">Λειτουργία Οθόνης</div>
      <button class="btn-action" id="theme-toggle-btn">Άλλαξε σε Φωτεινό/Σκοτεινό</button>
    </div>
  </div>
</div>

<div class="banner">
  <div class="banner-inner">
    <div>
      <div class="banner-title">Crypto Portfolio Pro</div>
      <div class="banner-sub" id="last-update">Φόρτωση δεδομένων...</div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="banner-btn" id="save-btn">Αποθήκευση</button>
      <button class="banner-btn" id="gear-btn">⚙</button>
    </div>
  </div>
</div>

<div class="dash">

  <div class="fng-card" id="fng-card">
    <div>
      <div style="font-size:10px; color:var(--muted); text-transform:uppercase; margin-bottom:2px;">Αγορά (Fear & Greed)</div>
      <div class="fng-class skeleton" id="fng-class">Φορτωση</div>
    </div>
    <div class="fng-val skeleton" id="fng-val">--</div>
  </div>

  <div class="sg-wrap">
    <button class="sec-toggle-btn" id="sg-toggle"><span>📊 Σύνοψη & Κατανομή</span> <span>▲</span></button>
    <div class="collapsible-content" id="sg-cards">
      <div class="sg">
        <div class="sc"><div class="sc-lbl">Αξία portfolio</div><div class="sc-val skeleton" id="total-val">0.00€</div></div>
        <div class="sc"><div class="sc-lbl">Κέρδος / Ζημία €</div><div class="sc-val skeleton" id="total-pnl">0.00€</div></div>
      </div>
      <div class="alloc-wrap">
        <div style="font-size:10px; color:var(--muted); text-transform:uppercase;">Κατανομή Portfolio</div>
        <div class="alloc-bar" id="alloc-bar"></div>
        <div class="alloc-labels" id="alloc-labels"></div>
      </div>
    </div>
  </div>

  <div class="sec-title" style="margin-top:15px;">Τα νομίσματά σου</div>
  <div class="coins-wrap" id="coins-wrap"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// Ασφαλής ανάγνωση δεδομένων για να μην κρασάρει ποτέ!
var ud = {};
try {
  var savedData = localStorage.getItem('cp_data_v5');
  if (savedData) {
    ud = JSON.parse(savedData);
  }
  if (typeof ud !== 'object' || ud === null) {
    ud = {};
  }
} catch(e) {
  ud = {};
}

var activeCoinIds = Object.keys(ud);
var prices = {};
var PAL = ['#2ecc8f','#5b7fff','#f59e0b','#a78bfa','#ec4899','#22d3ee'];

function save() {
  activeCoinIds.forEach(function(id) {
    var qtyEl = document.getElementById('qty-' + id);
    var avgEl = document.getElementById('avg-' + id);
    if(qtyEl) {
      ud[id].qty = parseFloat(qtyEl.value);
      if (isNaN(ud[id].qty)) ud[id].qty = 0;
    }
    if(avgEl) {
      ud[id].avg = parseFloat(avgEl.value);
      if (isNaN(ud[id].avg)) ud[id].avg = 0;
    }
  });
  localStorage.setItem('cp_data_v5', JSON.stringify(ud));
  showToast('✓ Αποθηκεύτηκε', 'green');
  recalc();
}

function renderPortfolio() {
  var wrap = document.getElementById('coins-wrap');
  
  // Έλεγχος Empty State
  if(activeCoinIds.length === 0) {
    wrap.innerHTML = '<div class="empty-state">' +
        '<h3 style="color:var(--text); margin-bottom:8px;">Καλωσόρισες! 👋</h3>' +
        '<p style="font-size:12px; margin-bottom:15px;">Το portfolio σου είναι προς το παρόν άδειο.</p>' +
        '<p style="font-size:12px;">Πάτα το <strong>γρανάζι ⚙️</strong> πάνω δεξιά και επίλεξε "Προσθήκη Demo".</p>' +
      '</div>';
    return;
  }

  var html = '';
  activeCoinIds.forEach(function(id, i) {
    var col = PAL[i % PAL.length];
    var safeQty = ud[id].qty || 0;
    var safeAvg = ud[id].avg || 0;
    
    html += '<div class="coin-card">' +
        '<div class="ch">' +
          '<div class="cname"><span style="color:' + col + '">●</span> ' + id.toUpperCase() + '</div>' +
          '<div class="cprice skeleton" id="price-' + id + '">-- €</div>' +
        '</div>' +
        '<div class="cb">' +
          '<div><div style="font-size:9px;color:var(--muted);">ΠΟΣΟΤΗΤΑ</div><input class="cin" id="qty-' + id + '" value="' + safeQty + '" onchange="recalc()"></div>' +
          '<div><div style="font-size:9px;color:var(--muted);">ΜΕΣΗ ΤΙΜΗ ΑΓΟΡΑΣ</div><input class="cin" id="avg-' + id + '" value="' + safeAvg + '" onchange="recalc()"></div>' +
          '<div style="grid-column: span 2; margin-top:5px;"><div style="font-size:9px;color:var(--muted);">ΑΞΙΑ (€)</div><div style="text-align:right; font-weight:bold; font-family:\'DM Mono\';" id="val-' + id + '">0.00€</div></div>' +
        '</div>' +
      '</div>';
  });
  wrap.innerHTML = html;
}

function recalc() {
  var totalVal = 0;
  var allocVals = [];
  var allocLabels = [];

  activeCoinIds.forEach(function(id, i) {
    var qtyEl = document.getElementById('qty-' + id);
    var qty = 0;
    if (qtyEl && qtyEl.value) {
      qty = parseFloat(qtyEl.value);
    } else if (ud[id] && ud[id].qty) {
      qty = parseFloat(ud[id].qty);
    }
    if (isNaN(qty)) qty = 0;

    var p = prices[id] || 0;
    var val = qty * p;
    totalVal += val;

    var valEl = document.getElementById('val-' + id);
    if(valEl) valEl.textContent = val.toFixed(2) + '€';
    
    if(val > 0) {
      allocVals.push(val);
      allocLabels.push(id.toUpperCase());
    }
  });

  document.getElementById('total-val').textContent = totalVal.toFixed(2) + '€';
  
  var allocBar = document.getElementById('alloc-bar');
  var allocLbls = document.getElementById('alloc-labels');
  
  if(totalVal > 0) {
    var barHtml = '';
    var lblHtml = '';
    for(var j=0; j<allocVals.length; j++) {
      var percent = (allocVals[j] / totalVal) * 100;
      var c = PAL[j % PAL.length];
      barHtml += '<div class="alloc-segment" style="width:' + percent + '%; background:' + c + '"></div>';
      lblHtml += '<div><span class="alloc-dot" style="background:' + c + '"></span>' + allocLabels[j] + ' ' + percent.toFixed(1) + '%</div>';
    }
    allocBar.innerHTML = barHtml;
    allocLbls.innerHTML = lblHtml;
  } else {
    allocBar.innerHTML = ''; 
    allocLbls.innerHTML = 'Δεν υπάρχει υπόλοιπο για κατανομή.';
  }
}

async function loadData() {
  try {
    // Φόρτωση τιμών (ΜΟΝΟ αν υπάρχουν νομίσματα)
    if(activeCoinIds.length > 0) {
      var res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=' + activeCoinIds.join(',') + '&vs_currencies=eur');
      if(res.ok) {
        var data = await res.json();
        activeCoinIds.forEach(function(id) {
          if (data[id] && data[id].eur) {
            prices[id] = data[id].eur;
          } else {
            prices[id] = 0;
          }
          var priceEl = document.getElementById('price-' + id);
          if(priceEl) priceEl.textContent = prices[id].toFixed(2) + '€';
        });
      }
    }
    recalc();

    // Φόρτωση Fear & Greed Index
    var fgRes = await fetch('https://api.alternative.me/fng/');
    if(fgRes.ok) {
      var fgData = await fgRes.json();
      if (fgData && fgData.data && fgData.data.length > 0) {
        var val = fg
