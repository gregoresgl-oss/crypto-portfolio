<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cosmos Hub Ultimate Tracker v5</title>
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid #1f2937; }
        .reward-glow { text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .indigo-glow { text-shadow: 0 0 10px rgba(99, 102, 241, 0.4); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="glass p-6 rounded-3xl mb-8 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex-1 w-full text-center md:text-left">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Cosmos Wallet Address</label>
                <input id="address" type="text" placeholder="cosmos1..." 
                       class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button onclick="runUltimateAnalysis()" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-3 rounded-xl font-bold mt-5 transition transform active:scale-95 shadow-lg shadow-indigo-500/20">
                🚀 ΕΚΚΙΝΗΣΗ
            </button>
        </div>

        <div id="mainUI" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-center">
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-500 text-[10px] uppercase font-bold">Total ATOM</p>
                    <h3 id="totalAtom" class="text-2xl font-black mt-1 indigo-glow">0.00</h3>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-500 text-[10px] uppercase font-bold">Avg. Buy Price (M.O.)</p>
                    <h3 id="avgCost" class="text-2xl font-black mt-1 text-emerald-400">$ --.--</h3>
                    <p id="moStatus" class="text-[9px] text-slate-600 mt-1 italic italic">Pending...</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-yellow-500 text-[10px] uppercase font-bold">APY (%)</p>
                    <h3 id="apyVal" class="text-2xl font-black mt-1 text-yellow-500">--%</h3>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-500 text-[10px] uppercase font-bold">Unclaimed Rewards</p>
                    <h3 id="pendingRewards" class="text-2xl font-black mt-1 reward-glow text-amber-400">0.00</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass rounded-3xl overflow-hidden lg:col-span-2">
                    <div class="p-5 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center">
                        <h4 class="font-bold text-sm">Ενεργά Delegations</h4>
                        <button onclick="downloadCSV()" id="csvBtn" class="hidden bg-emerald-600 hover:bg-emerald-500 text-[10px] px-3 py-1 rounded-lg font-bold transition">
                            DOWNLOAD CSV
                        </button>
                    </div>
                    <div id="valList" class="p-4 space-y-3 max-h-[400px] overflow-y-auto">
                        </div>
                </div>

                <div class="space-y-6">
                    <div class="glass p-8 rounded-3xl text-center">
                        <p class="text-indigo-400 font-bold text-xs mb-2">1-Year Forecast</p>
                        <h2 id="projectionVal" class="text-4xl font-black mb-1">0.00</h2>
                        <p class="text-slate-500 text-[10px]">ATOM (Compound Staking)</p>
                    </div>
                    <div class="glass p-6 rounded-3xl text-xs text-slate-500 leading-relaxed">
                        <h5 class="text-slate-300 font-bold mb-2 uppercase">Πληροφορίες:</h5>
                        <p>• Το M.O. υπολογίζεται από τις τελευταίες 15 εισερχόμενες συναλλαγές.</p>
                        <p class="mt-2">• Χρησιμοποιείται το API Key: <span class="text-indigo-400">CG-wja...</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "CG-wjaFXkM7y83LvnEgMENX8eqq";
        const REST_URL = "https://rest.cosmos.directory/cosmoshub";
        let analyzedTransactions = []; // For CSV Export

        async function runUltimateAnalysis() {
            const addr = document.getElementById('address').value;
            if(!addr.startsWith('cosmos1')) return alert("Invalid Cosmos Address");

            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('csvBtn').classList.add('hidden');
            analyzedTransactions = [];

            try {
                // Parallel Fetch for efficiency
                const [bal, stke, rew, mint] = await Promise.all([
                    fetch(`${REST_URL}/cosmos/bank/v1beta1/balances/${addr}`).then(r => r.json()),
                    fetch(`${REST_URL}/cosmos/staking/v1beta1/delegations/${addr}`).then(r => r.json()),
                    fetch(`${REST_URL}/cosmos/distribution/v1beta1/delegators/${addr}/rewards`).then(r => r.json()),
                    fetch(`${REST_URL}/cosmos/mint/v1beta1/inflation`).then(r => r.json())
                ]);

                const avail = (bal.balances.find(b => b.denom === 'uatom')?.amount || 0) / 1000000;
                const staked = stke.delegation_responses.reduce((s, d) => s + parseFloat(d.balance.amount), 0) / 1000000;
                const totalRewards = (rew.total.find(r => r.denom === 'uatom')?.amount || 0) / 1000000;
                const inflation = parseFloat(mint.inflation);

                const total = avail + staked;
                document.getElementById('totalAtom').innerText = total.toFixed(2);
                document.getElementById('pendingRewards').innerText = totalRewards.toFixed(4);

                // APY & Projection
                const apy = (inflation / 0.65) * 100;
                document.getElementById('apyVal').innerText = apy.toFixed(2) + "%";
                const projected = total * Math.pow((1 + (apy/100)), 1);
                document.getElementById('projectionVal').innerText = projected.toFixed(2) + " ATOM";

                renderVals(stke.delegation_responses, rew.rewards);
                calculateMOPro(addr);

            } catch (err) { console.error(err); alert("Error fetching data from blockchain."); }
        }

        function renderVals(delegations, rewards) {
            const container = document.getElementById('valList');
            container.innerHTML = '';
            delegations.forEach(d => {
                const rew = (rewards.find(r => r.validator_address === d.delegation.validator_address)?.reward.find(a => a.denom === 'uatom')?.amount || 0) / 1000000;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900/40 p-4 rounded-2xl border border-slate-800">
                        <div>
                            <p class="text-[9px] text-slate-500 font-mono mb-1">${d.delegation.validator_address}</p>
                            <p class="text-sm font-black">${(d.balance.amount/1000000).toFixed(2)} ATOM</p>
                        </div>
                        <div class="text-right">
                            <span class="text-amber-400 text-xs font-bold">+${rew.toFixed(4)} Rewards</span>
                        </div>
                    </div>
                `;
            });
        }

        async function calculateMOPro(addr) {
            const status = document.getElementById('moStatus');
            status.innerText = "Analyzing tx history...";
            
            try {
                const txRes = await fetch(`${REST_URL}/cosmos/tx/v1beta1/txs?events=transfer.recipient='${addr}'&pagination.limit=15`);
                const txData = await txRes.json();
                
                let totalSpentUSD = 0; let totalVol = 0;
                const priceCache = {};

                for(let tx of txData.tx_responses) {
                    const dateRaw = tx.timestamp.split('T')[0];
                    const dateCG = dateRaw.split('-').reverse().join('-');
                    const amount = (tx.tx.body.messages[0].amount?.[0]?.amount || 0) / 1000000;

                    if(amount > 0) {
                        if(!priceCache[dateCG]) {
                            await new Promise(r => setTimeout(r, 400)); // Speeded up with API Key
                            const pRes = await fetch(`https://api.coingecko.com/api/v3/coins/cosmos/history?date=${dateCG}&localization=false&x_cg_demo_api_key=${API_KEY}`);
                            const pData = await pRes.json();
                            priceCache[dateCG] = pData.market_data?.current_price?.usd || 0;
                        }
                        
                        const price = priceCache[dateCG];
                        totalSpentUSD += (amount * price);
                        totalVol += amount;

                        // Save for CSV
                        analyzedTransactions.push({ date: dateRaw, amount: amount, priceAtTime: price, totalUSD: (amount * price) });
                    }
                }
                document.getElementById('avgCost').innerText = totalVol > 0 ? `$${(totalSpentUSD/totalVol).toFixed(2)}` : "$0.00";
                status.innerText = "Complete!";
                if(analyzedTransactions.length > 0) document.getElementById('csvBtn').classList.remove('hidden');

            } catch (err) { status.innerText = "API Limit reached."; }
        }

        function downloadCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Date,Amount_ATOM,Price_USD,Total_Value_USD\n";
            analyzedTransactions.forEach(t => {
                csvContent += `${t.date},${t.amount},${t.priceAtTime},${t.totalUSD}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "cosmos_portfolio_history.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
</body>
</html>
