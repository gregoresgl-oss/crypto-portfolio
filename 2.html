<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cosmos Portfolio - CSV Engine</title>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid #1e293b; }
        .drop-zone { border: 2px dashed #334155; transition: 0.3s; }
        .drop-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-indigo-500 uppercase tracking-tighter">Cosmos CSV Analyzer</h1>
            <p class="text-slate-500 text-sm">Υπολογισμός Μ.Ο. απευθείας από το Mintscan Export</p>
        </header>

        <div class="glass p-8 rounded-3xl mb-8 drop-zone text-center cursor-pointer" id="dropArea">
            <input type="file" id="csvFile" accept=".csv" class="hidden">
            <div id="uploadText">
                <p class="text-lg font-bold">Σύρε το CSV εδώ ή κάνε κλικ</p>
                <p class="text-slate-500 text-xs mt-2 uppercase tracking-widest">Υποστηρίζεται αρχείο από Mintscan</p>
            </div>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-3xl border-l-4 border-l-indigo-500">
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Υπολογισμένος Μ.Ο.</p>
                    <h2 id="finalMO" class="text-4xl font-black mt-2 text-white">$ 0.00</h2>
                    <p id="progressText" class="text-[10px] text-indigo-400 mt-2 italic">Ready to process...</p>
                </div>
                <div class="glass p-8 rounded-3xl">
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Σύνολο Συναλλαγών</p>
                    <h2 id="totalTx" class="text-4xl font-black mt-2 text-white">0</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "CG-wjaFXkM7y83LvnEgMENX8eqq";
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('csvFile');

        dropArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => processCSV(e.target.result);
            reader.readAsText(file);
        }

        async function processCSV(csvData) {
            document.getElementById('results').classList.remove('hidden');
            const lines = csvData.split('\n');
            const headers = lines[0].split(',');
            
            // Βρίσκουμε τις σωστές στήλες (Mintscan format)
            const dateIdx = headers.findIndex(h => h.includes('Timestamp') || h.includes('Time'));
            const amountIdx = headers.findIndex(h => h.includes('Amount'));
            const typeIdx = headers.findIndex(h => h.includes('Type'));

            let totalSpentUSD = 0;
            let totalVolumeATOM = 0;
            let txCount = 0;
            const priceCache = {};

            for (let i = 1; i < lines.length; i++) {
                const columns = lines[i].split(',');
                if (columns.length < 2) continue;

                const type = columns[typeIdx]?.toLowerCase() || "";
                // Φιλτράρουμε μόνο εισερχόμενες συναλλαγές
                if (type.includes('receive') || type.includes('transfer')) {
                    const rawDate = columns[dateIdx].split(' ')[0]; // YYYY-MM-DD
                    const amountStr = columns[amountIdx].replace(/"/g, '').split(' ')[0];
                    const amount = parseFloat(amountStr);

                    if (amount > 0) {
                        const dateCG = rawDate.split('-').reverse().join('-'); // DD-MM-YYYY

                        if (!priceCache[dateCG]) {
                            document.getElementById('progressText').innerText = `Fetching price for ${dateCG}...`;
                            await new Promise(r => setTimeout(r, 1500)); // Delay for safety
                            
                            try {
                                const pRes = await fetch(`https://api.coingecko.com/api/v3/coins/cosmos/history?date=${dateCG}&localization=false&x_cg_demo_api_key=${API_KEY}`);
                                const pData = await pRes.json();
                                priceCache[dateCG] = pData.market_data?.current_price?.usd || 0;
                            } catch (err) {
                                console.error("API Error");
                                priceCache[dateCG] = 0;
                            }
                        }

                        totalSpentUSD += (amount * priceCache[dateCG]);
                        totalVolumeATOM += amount;
                        txCount++;
                        
                        document.getElementById('totalTx').innerText = txCount;
                    }
                }
            }

            const finalMO = totalVolumeATOM > 0 ? (totalSpentUSD / totalVolumeATOM) : 0;
            document.getElementById('finalMO').innerText = `$${finalMO.toFixed(2)}`;
            document.getElementById('progressText').innerText = "Ανάλυση ολοκληρώθηκε!";
        }
    </script>
</body>
</html>
