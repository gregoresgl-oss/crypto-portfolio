 <!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cosmos Portfolio Auditor PRO</title>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        .drop-zone { border: 2px dashed #334155; transition: 0.3s; min-height: 150px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .drop-zone:hover { border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-black text-indigo-500 uppercase tracking-tighter">Portfolio Auditor v7</h1>
            <p class="text-slate-500 text-sm">Πλήρης ανάλυση 4ετίας: Αγορές + Rewards (Re-stake)</p>
        </header>

        <div class="glass p-8 rounded-[2rem] mb-8 drop-zone" id="dropArea">
            <input type="file" id="csvFile" accept="*" class="hidden">
            <div class="text-center">
                <p class="text-lg font-bold">Ρίξε το μεγάλο CSV εδώ (400+ TRX)</p>
                <p class="text-slate-500 text-xs mt-2 uppercase">Θα αναλυθούν όλες οι γραμμές αυτόματα</p>
            </div>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-6 rounded-2xl border-b-4 border-indigo-500 text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Πραγματικός Μ.Ο.</p>
                    <h2 id="finalMO" class="text-3xl font-black text-white">$ 0.00</h2>
                    <p class="text-[9px] text-indigo-400 mt-2 font-bold uppercase tracking-tighter italic">Συμπεριλαμβανομένων των Rewards</p>
                </div>
                <div class="glass p-6 rounded-2xl text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Συνολικό ATOM</p>
                    <h2 id="totalVol" class="text-3xl font-black text-white">0.00</h2>
                </div>
                <div class="glass p-6 rounded-2xl text-center">
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Συναλλαγές</p>
                    <h2 id="totalTx" class="text-3xl font-black text-white">0</h2>
                </div>
            </div>

            <div id="log" class="glass p-4 rounded-xl h-40 overflow-y-auto text-[10px] font-mono text-slate-400 space-y-1">
                </div>
        </div>
    </div>

    <script>
        const API_KEY = "CG-wjaFXkM7y83LvnEgMENX8eqq";
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('csvFile');
        const log = document.getElementById('log');

        dropArea.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => processCSV(e.target.result);
            reader.readAsText(file);
        }

        async function processCSV(csvData) {
            document.getElementById('results').classList.remove('hidden');
            log.innerHTML = "<div>🚀 Έναρξη ανάλυσης...</div>";
            
            const lines = csvData.split(/\r?\n/);
            const headers = lines[0].split(',');
            
            const dateIdx = headers.findIndex(h => h.toLowerCase().includes('time'));
            const amountIdx = headers.findIndex(h => h.toLowerCase().includes('amount'));
            const typeIdx = headers.findIndex(h => h.toLowerCase().includes('type'));

            let totalSpentUSD = 0;
            let totalVolumeATOM = 0;
            let txCount = 0;
            const priceCache = {};

            for (let i = 1; i < lines.length; i++) {
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (columns.length < 2) continue;

                const type = columns[typeIdx]?.toLowerCase() || "";
                const amountStr = columns[amountIdx]?.replace(/"/g, '').split(' ')[0] || "0";
                const amount = parseFloat(amountStr);
                const rawDate = columns[dateIdx]?.replace(/"/g, '').split(' ')[0];

                if (amount > 0 && rawDate && rawDate.includes('-')) {
                    const dateCG = rawDate.split('-').reverse().join('-');
                    
                    // ΛΟΓΙΚΗ: 
                    // Αν είναι REWARD/DELEGATE/RE-STAKE -> Κόστος $0 (μειώνει τον Μ.Ο.)
                    // Αν είναι RECEIVE/TRANSFER -> Τραβάμε ιστορική τιμή αγοράς.
                    
                    let costPerAtom = 0;
                    const isReward = type.includes('reward') || type.includes('delegate') || type.includes('stake');

                    if (!isReward) {
                        if (!priceCache[dateCG]) {
                            log.innerHTML += `<div>🌐 Αναζήτηση τιμής για αγορά στις ${dateCG}...</div>`;
                            log.scrollTop = log.scrollHeight;
                            await new Promise(r => setTimeout(r, 2200)); 
                            
                            try {
                                const pRes = await fetch(`https://api.coingecko.com/api/v3/coins/cosmos/history?date=${dateCG}&localization=false&x_cg_demo_api_key=${API_KEY}`);
                                const pData = await pRes.json();
                                priceCache[dateCG] = pData.market_data?.current_price?.usd || 0;
                            } catch (err) { priceCache[dateCG] = 0; }
                        }
                        costPerAtom = priceCache[dateCG];
                    } else {
                        log.innerHTML += `<div class="text-green-500">💎 Reward/Restake: ${amount} ATOM (Κόστος $0)</div>`;
                    }

                    totalSpentUSD += (amount * costPerAtom);
                    totalVolumeATOM += amount;
                    txCount++;

                    // UI Updates
                    document.getElementById('totalTx').innerText = txCount;
                    document.getElementById('totalVol').innerText = totalVolumeATOM.toFixed(2);
                    const currentMO = totalSpentUSD / totalVolumeATOM;
                    document.getElementById('finalMO').innerText = `$${currentMO.toFixed(2)}`;
                    log.scrollTop = log.scrollHeight;
                }
            }
            log.innerHTML += `<div class="text-indigo-400 font-bold">✅ Η ανάλυση 400+ συναλλαγών ολοκληρώθηκε!</div>`;
        }
    </script>
</body>
</html>
